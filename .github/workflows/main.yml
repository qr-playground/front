name: Deploy Frontend to S3

on:
  push:
    branches:
      - main # 또는 배포를 트리거할 브랜치 (e.g., master, release)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./front # Vite 프로젝트가 front 디렉터리에 있는 경우

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18" # 프로젝트에 맞는 Node.js 버전 사용

      - name: Install dependencies
        run: npm install

      - name: Build Vite project
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }} # GitHub Secret에서 값을 가져와 환경 변수로 설정

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2 # 또는 v1, 상황에 맞게
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }} # 예: ap-northeast-2

      - name: Deploy to S3
        run: |
          aws s3 sync ./dist s3://${{ secrets.S3_BUCKET_NAME }} --delete
